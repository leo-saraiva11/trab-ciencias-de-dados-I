# =====================================================================
# Configuração de MODELOS e PARAMETRIZAÇÕES — Etapa (d/e)
# 3 algoritmos: KNN, Árvore de Decisão e MLP (rede neural).
# Cada modelo usa os dados já pré-processados com SEU perfil (processed/).
# >= 2 parametrizações por algoritmo (exigência do enunciado).
# Consumido por: treinar.py
# =====================================================================

avaliacao:
  # métricas calculadas no conjunto de TESTE
  metricas: [acuracia, precisao, recall, f1, roc_auc]
  # o split treino/teste já foi feito no pré-processamento (holdout 70/30 estratificado)

modelos:

  knn:
    classe: KNeighborsClassifier
    # KNN NÃO foi o "algoritmo não visto em aula" (é clássico) — usado como baseline
    parametrizacoes:
      - nome: "k=3 (uniforme)"
        params: {n_neighbors: 3, weights: uniform}
      - nome: "k=11 (ponderado por distância)"
        params: {n_neighbors: 11, weights: distance}

  arvore:
    classe: DecisionTreeClassifier
    parametrizacoes:
      - nome: "gini, profundidade=5"
        params: {criterion: gini, max_depth: 5, random_state: 42}
      - nome: "entropy, profundidade ilimitada"
        params: {criterion: entropy, max_depth: null, min_samples_leaf: 5, random_state: 42}

  mlp:
    classe: MLPClassifier
    # >>> Sugestão de "algoritmo NÃO visto em aula" para descrever no relatório <<<
    parametrizacoes:
      - nome: "1 camada oculta (50)"
        params: {hidden_layer_sizes: [50], activation: relu, max_iter: 400, random_state: 42}
      - nome: "2 camadas ocultas (100,50)"
        params: {hidden_layer_sizes: [100, 50], activation: relu, alpha: 0.001, max_iter: 400, random_state: 42}
